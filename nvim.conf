" অটো ইন্ডেন্ট
set autoindent
set smartindent
set tabstop=4
set shiftwidth=4
set expandtab

" সিনট্যাক্স হাইলাইটিং
syntax on
set termguicolors

" ব্র্যাকেট ম্যাচিং
set showmatch
set matchtime=2

" ফাইলটাইপ অনুযায়ী কনফিগ
filetype plugin indent on

" অটো ক্লোজ ব্র্যাকেট (প্লাগিন ছাড়া)
inoremap { {}<Left>
inoremap ( ()<Left>
inoremap [ []<Left>
inoremap ' ''<Left>
inoremap " ""<Left>

" অন্যান্য ফিচার
set number
set cursorline
set hlsearch
set incsearch
